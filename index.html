
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominio Parqueado | JAM MULTIMEDIA</title>
    <style>
        :root {
            --primary: #a3e635;
            --bg: #020617;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #0f172a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 1.5rem;
            border: 1px solid #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text);
        }
        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            background: rgba(163, 230, 53, 0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--primary);
        }
        .footer {
            border-top: 1px solid #1e293b;
            padding-top: 1.5rem;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">JAM MULTIMEDIA</div>
        <div class="status">Servidor Activo & Seguro</div>
        <h1>Este dominio ha sido parqueado con éxito</h1>
        <p>
            Estamos preparando algo increíble. El alojamiento y la infraestructura de este sitio 
            están gestionados por la red profesional de <strong>JAM MULTIMEDIA</strong>.
        </p>
        <div class="footer">
            &copy; 2026 JAM MULTIMEDIA | Infraestructura de Alto Rendimiento
        </div>
    </div>
</body>
</html>
